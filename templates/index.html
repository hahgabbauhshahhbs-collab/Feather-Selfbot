<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feather Selfbot V1.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-black text-white overflow-hidden select-none" oncontextmenu="return false;">

  <canvas id="snow" class="fixed inset-0 z-0 pointer-events-none"></canvas>

  <div class="relative z-20 min-h-screen p-6 flex items-center justify-center">

    <!-- Login Screen -->
    <div id="loginScreen" class="max-w-md w-full glass rounded-3xl p-10 border border-white/20 relative overflow-hidden subtle-glow">
      <div class="glow-overlay absolute inset-0 pointer-events-none"></div>

      <h1 class="text-6xl font-bold text-center mb-2 tracking-tighter">
        <span class="shiny-text feather-title">Feather</span>
      </h1>
      <p class="text-center text-zinc-400 text-2xl mb-10 font-medium">Fast</p>
      
      <input type="password" id="tokenInput" class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-6 py-4 focus:outline-none focus:border-white mb-8 text-center font-mono text-sm" placeholder="Enter Discord Token"/>

      <button onclick="validateAndDeploy()" class="w-full bg-white text-black py-5 rounded-2xl font-bold text-xl hover:scale-105 transition-all active:scale-95">
        DEPLOY SELFBOT
      </button>

      <div class="flex gap-4 mt-8 text-sm">
        <div class="flex-1 bottom-box text-white text-center py-4 rounded-2xl">No Token Stealing</div>
        <div class="flex-1 bottom-box text-white text-center py-4 rounded-2xl">Safest Selfbot</div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden w-full max-w-6xl mx-auto">
      <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-bold shiny-text">Control Panel</h1>
        <button onclick="logout()" class="border border-white/50 hover:bg-white hover:text-black px-8 py-3 rounded-2xl transition-all font-semibold">LOGOUT</button>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4">
          <div class="glass rounded-3xl p-8 text-center border border-white/10">
            <img id="avatar" class="w-32 h-32 mx-auto rounded-2xl border-2 border-white/30 mb-6" alt="Avatar">
            <h2 id="username" class="text-3xl font-bold">Feather User</h2>
            <p class="text-emerald-400 mt-2">● Online</p>
          </div>
        </div>

        <div class="lg:col-span-8 grid grid-cols-2 gap-5">
          <div onclick="openStreamingModal()" class="feature-card cursor-pointer">Streaming Status</div>
          <div class="feature-card">Nitro Sniper</div>
          <div onclick="startSafeSpam()" class="feature-card cursor-pointer">Safe Spam</div>
          <div class="feature-card">Giveaway Joiner</div>
          <div class="feature-card">Server Copier</div>
          <div class="feature-card">Auto Responder</div>
          <div class="feature-card">Mass DM</div>
          <div class="feature-card">VC Joiner</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Streaming Modal -->
  <div id="streamingModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl z-50 flex items-center justify-center">
    <div class="glass rounded-3xl p-8 w-full max-w-md border border-white/10">
      <h2 class="text-2xl font-bold mb-6 text-center">Streaming Status</h2>
      <input id="streamTitle" type="text" class="w-full mb-4 bg-zinc-900 rounded-2xl px-5 py-3" placeholder="Stream Title"/>
      <input id="streamDesc" type="text" class="w-full mb-6 bg-zinc-900 rounded-2xl px-5 py-3" placeholder="Description (optional)"/>
      <div class="flex gap-4">
        <button onclick="startStreaming()" class="flex-1 bg-white text-black py-4 rounded-2xl font-bold">Start Streaming</button>
        <button onclick="closeStreamingModal()" class="flex-1 bg-zinc-800 py-4 rounded-2xl">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/js/script.js"></script>
</body>
</html>
